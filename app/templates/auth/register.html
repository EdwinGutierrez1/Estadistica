{% extends 'base.html' %}
{% block title %}Registro{% endblock %}
{% block content %}
<div style="min-height:80vh; display:flex; align-items:center; justify-content:center; padding:40px">
  <div style="width:100%; max-width:420px">
    <h1 style="font-family:var(--font-display); font-size:2rem; color:var(--clr-gold); margin-bottom:8px">Crear cuenta</h1>
    <p style="opacity:0.6; margin-bottom:32px; font-size:0.9rem">Recibirás 1,000 fichas de inicio.</p>

    <div class="form-group">
      <label class="form-label">Nombre de usuario</label>
      <input id="username" class="form-input" type="text" placeholder="Mínimo 3 caracteres" autocomplete="username">
    </div>

    <button class="btn btn--gold" style="width:100%" onclick="doRegister()">Registrarse</button>

    <p style="margin-top:16px; font-size:0.85rem; opacity:0.6; text-align:center">
      ¿Ya tienes cuenta? <a href="{{ url_for('auth.login') }}" style="color:var(--clr-gold-light)">Ingresar</a>
    </p>
  </div>
</div>
<script>
async function doRegister() {
  const username = document.getElementById('username').value.trim();
  if (username.length < 3) return showToast('Mínimo 3 caracteres', 'error');
  const r = await fetch('/auth/register', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ username })
  });
  const d = await r.json();
  if (d.success) window.location.href = '/rooms/';
  else showToast(d.error || 'Error al registrarse', 'error');
}
</script>
{% endblock %}
