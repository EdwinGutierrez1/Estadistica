{% extends 'base.html' %}
{% block title %}Error{% endblock %}
{% block content %}
<div style="min-height:70vh; display:flex; align-items:center; justify-content:center; text-align:center; padding:40px">
  <div>
    <div style="font-size:5rem; margin-bottom:16px">⚠️</div>
    <h2 style="font-family:var(--font-display); color:var(--clr-gold); margin-bottom:12px; font-size:1.8rem">Algo salió mal</h2>
    <p style="opacity:0.6; margin-bottom:32px">{{ message or 'Error desconocido' }}</p>
    <a href="{{ url_for('index') }}" class="btn btn--outline">← Volver al inicio</a>
  </div>
</div>
{% endblock %}
